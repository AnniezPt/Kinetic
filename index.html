<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINETIC | Live Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({ appId: "03eed6ad-5f71-4f70-82f8-ae94defc8823" });
      });
    </script>
</head>
<body class="text-kin-dark pb-32">

    <header id="global-header" class="flex justify-between items-center p-6 sticky top-0 bg-kin-bg/90 backdrop-blur-md z-40">
        <div class="flex items-center gap-3">
            <img id="header-avatar-img" src="" class="w-12 h-12 rounded-xl object-cover shadow-sm border-2 border-white" onclick="changeAvatar('my')">
            <div>
                <h1 class="font-black tracking-tighter text-2xl text-kin-blue leading-none">KINETIC</h1>
                <span id="sync-status" class="text-[9px] font-bold uppercase tracking-widest text-slate-400">Conectando...</span>
            </div>
        </div>
        <button onclick="requestOneSignalPush()" class="w-11 h-11 bg-white rounded-xl flex items-center justify-center text-slate-400 relative shadow-sm">
            <i class="ph-fill ph-bell text-2xl"></i>
            <span id="bell-badge" class="absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
    </header>

    <main class="px-6 max-w-md mx-auto">
        <section id="view-dashboard" class="view-section active">
            <div class="mb-6">
                <p class="text-kin-orange font-bold text-[10px] uppercase tracking-[0.3em] mb-1">Semana 0 • Fase Iniciación</p>
                <h2 class="text-5xl font-black tracking-tighter uppercase italic leading-[0.9]">Dashboard</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-50 flex flex-col items-center">
                    <p class="text-[9px] font-black text-kin-blue uppercase mb-4 tracking-widest">TÚ</p>
                    <div class="relative w-24 h-24 mb-4">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#f1f5f9" stroke-width="3"></path>
                            <path id="dash-my-cal-svg" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#0047ff" stroke-width="3" stroke-linecap="round" class="transition-all duration-1000"></path>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center font-black text-sm" id="dash-my-cal-text">0%</div>
                    </div>
                    <div class="text-center cursor-pointer" onclick="promptEditStat('myCalories')">
                        <p id="dash-my-active-cals" class="text-xl font-black text-slate-800">0</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Kcal <i class="ph ph-pencil-simple"></i></p>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-50 flex flex-col items-center">
                    <p class="text-[9px] font-black text-kin-brown uppercase mb-4 tracking-widest">COMPA</p>
                    <div class="relative w-24 h-24 mb-4">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#f1f5f9" stroke-width="3"></path>
                            <path id="dash-partner-cal-svg" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#8b4513" stroke-width="3" stroke-linecap="round" class="transition-all duration-1000"></path>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center font-black text-sm" id="dash-partner-cal-text">0%</div>
                    </div>
                    <div class="text-center cursor-pointer" onclick="promptEditStat('partnerCalories')">
                        <p id="dash-partner-active-cals" class="text-xl font-black text-slate-800">0</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Kcal <i class="ph ph-pencil-simple"></i></p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-50">
                <div class="grid grid-cols-2 gap-8 divide-x divide-slate-100">
                    <div class="cursor-pointer" onclick="promptEditStat('myWeight')">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Mi Peso <i class="ph ph-pencil-simple"></i></p>
                        <p class="text-4xl font-black text-slate-800 tracking-tighter"><span id="dash-my-weight">--</span><span class="text-sm text-slate-300 ml-1">KG</span></p>
                    </div>
                    <div class="cursor-pointer text-right" onclick="promptEditStat('partnerWeight')">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Compa <i class="ph ph-pencil-simple"></i></p>
                        <p class="text-4xl font-black text-slate-800 tracking-tighter"><span id="dash-partner-weight">--</span><span class="text-sm text-slate-300 ml-1">KG</span></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-shared" class="view-section">
            <div class="flex justify-between items-center mb-8 pt-6">
                <div class="flex flex-col">
                    <div class="flex items-center gap-3">
                        <button onclick="changeMonth(-1)" class="text-slate-300"><i class="ph-bold ph-caret-left"></i></button>
                        <h2 id="calendar-month-title" class="text-3xl font-black tracking-tighter italic text-slate-800 uppercase w-40 text-center">---</h2>
                        <button onclick="changeMonth(1)" class="text-slate-300"><i class="ph-bold ph-caret-right"></i></button>
                    </div>
                </div>
                <div class="flex -space-x-4">
                    <img id="duo-my-img" onclick="changeAvatar('my')" src="" class="w-11 h-11 rounded-full border-4 border-white object-cover shadow-sm z-10 cursor-pointer">
                    <img id="duo-partner-img" onclick="changeAvatar('partner')" src="" class="w-11 h-11 rounded-full border-4 border-white object-cover shadow-sm cursor-pointer">
                </div>
            </div>

            <div class="flex justify-center gap-2 mb-8 overflow-x-auto no-scrollbar pb-2">
                <button id="tool-you" onclick="setDuoTool('you')" class="bg-white shadow-sm px-5 py-3 rounded-2xl text-[10px] font-black flex items-center gap-3 border-2 border-transparent transition-all">
                    <div class="w-3 h-3 rounded-full bg-kin-blue"></div> TÚ
                </button>
                <button id="tool-partner" onclick="setDuoTool('partner')" class="bg-white shadow-sm px-5 py-3 rounded-2xl text-[10px] font-black flex items-center gap-3 border-2 border-transparent transition-all">
                    <div class="w-3 h-3 rounded-full bg-kin-brown"></div> COMPA
                </button>
                <button id="tool-synced" onclick="setDuoTool('synced')" class="bg-white shadow-sm px-5 py-3 rounded-2xl text-[10px] font-black flex items-center gap-3 border-2 border-transparent transition-all">
                    <div class="flex -space-x-1"><div class="w-3 h-3 rounded-full bg-kin-blue"></div><div class="w-3 h-3 rounded-full bg-kin-brown"></div></div> SYNC
                </button>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center mb-10"></div>
            <div id="upcoming-duos-container" class="space-y-4 mb-10"></div>
        </section>

        <section id="view-workout" class="view-section"><div id="workout-groups-container" class="space-y-4 pt-6"></div></section>
        <section id="view-notes" class="view-section"><div id="notes-container" class="space-y-6 pt-6"></div></section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-between items-center px-2 py-4 max-w-md mx-auto left-0 right-0 z-50 shadow-2xl">
        <button onclick="switchTab('dashboard')" id="tab-dashboard" class="nav-item active flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph-fill ph-squares-four text-2xl"></i></div><span class="text-[9px] font-black uppercase">Panel</span></button>
        <button onclick="switchTab('workout')" id="tab-workout" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-barbell text-2xl"></i></div><span class="text-[9px] font-black uppercase">Entreno</span></button>
        <button onclick="switchTab('shared')" id="tab-shared" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-users text-2xl"></i></div><span class="text-[9px] font-black uppercase">Dúo</span></button>
        <button onclick="switchTab('notes')" id="tab-notes" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-journal-bookmark text-2xl"></i></div><span class="text-[9px] font-black uppercase">Diario</span></button>
        <button onclick="switchTab('profile')" id="tab-profile" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-user text-2xl"></i></div><span class="text-[9px] font-black uppercase">Perfil</span></button>
    </nav>

    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
    <script src="app.js"></script>
</body>
</html>
