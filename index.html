<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINETIC | Memento Mori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kin-blue': '#0047ff', 'kin-bg': '#f4f5f9', 'kin-dark': '#1e2024',
                        'kin-orange': '#b5531d', 'kin-brown': '#8b4513'
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "03eed6ad-5f71-4f70-82f8-ae94defc8823", 
        });
      });
    </script>
</head>
<body class="text-kin-dark pb-32">

    <header id="global-header" class="flex justify-between items-center p-6 sticky top-0 bg-kin-bg/90 backdrop-blur-md z-40">
        <div class="flex items-center gap-3">
            <div class="relative cursor-pointer" onclick="changeAvatar('my')">
                <img id="header-avatar-img" src="" class="w-12 h-12 rounded-xl object-cover shadow-sm border-2 border-white">
                <div class="absolute -top-1 -right-1 bg-green-500 w-3 h-3 rounded-full border-2 border-kin-bg"></div>
            </div>
            <div>
                <h1 class="font-black tracking-tighter text-2xl text-kin-blue leading-none">KINETIC</h1>
                <span class="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-400 mt-1">Memento mori</span>
            </div>
        </div>
        <button onclick="requestOneSignalPush()" class="w-11 h-11 bg-white rounded-xl flex items-center justify-center text-slate-400 relative shadow-sm">
            <i class="ph-fill ph-bell text-2xl"></i>
            <span id="bell-badge" class="absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
    </header>

    <main class="px-6 max-w-md mx-auto">
        <section id="view-dashboard" class="view-section active">
            <div class="mb-6">
                <p class="text-kin-orange font-bold text-[10px] uppercase tracking-[0.3em] mb-1">Semana 0 • Fase Iniciación</p>
                <h2 class="text-5xl font-black tracking-tighter uppercase italic leading-[0.9]">Dashboard</h2>
                <div class="flex items-center gap-2 mt-5 text-xs font-black bg-white inline-flex px-4 py-2 rounded-xl shadow-sm border border-slate-100">
                    <span class="text-slate-400 uppercase tracking-widest border-r pr-2">Racha</span>
                    <span id="dash-streak" class="text-kin-dark uppercase">0 DÍAS</span>
                    <i class="ph-fill ph-fire text-kin-orange"></i>
                </div>
            </div>

            <div class="bg-white rounded-[2.8rem] p-8 shadow-sm mb-4 border border-slate-50 flex flex-col items-center">
                <div class="relative w-44 h-44 mb-8">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#f1f5f9" stroke-width="3.5"></path>
                        <path id="dash-cal-svg" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#0047ff" stroke-width="3.5" stroke-linecap="round" class="transition-all duration-1000"></path>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="dash-cal-percent" class="text-5xl font-black text-slate-800 tracking-tighter">0%</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Activo</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 w-full gap-6 px-2">
                    <div onclick="promptEditStat('calories')" class="cursor-pointer group">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 group-hover:text-kin-blue">Activas <i class="ph-bold ph-pencil-simple ml-1"></i></p>
                        <p id="dash-active-cals" class="text-3xl font-black text-kin-blue italic tracking-tighter">0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Restantes</p>
                        <p id="dash-rem-cals" class="text-3xl font-black text-slate-800 tracking-tighter">1,650</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[2.8rem] p-8 shadow-sm border border-slate-50">
                <div onclick="promptEditStat('weight')" class="flex justify-between items-start mb-6 cursor-pointer group">
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 group-hover:text-kin-blue">Peso Actual <i class="ph-bold ph-pencil-simple ml-1"></i></p>
                        <div class="flex items-baseline gap-1">
                            <span id="dash-current-weight" class="text-5xl font-black text-slate-800 tracking-tighter">--</span>
                            <span class="text-sm font-bold text-slate-400 uppercase">KG</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-shared" class="view-section">
            <div class="flex justify-between items-center mb-8 pt-6">
                <div class="flex flex-col">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Schedule Sync</p>
                    <div class="flex items-center gap-3">
                        <button onclick="changeMonth(-1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-400"><i class="ph-bold ph-caret-left"></i></button>
                        <h2 id="calendar-month-title" class="text-3xl font-black tracking-tighter italic text-slate-800 uppercase w-40 text-center">---</h2>
                        <button onclick="changeMonth(1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-400"><i class="ph-bold ph-caret-right"></i></button>
                    </div>
                </div>
                <div class="flex -space-x-4">
                    <img id="duo-my-img" onclick="changeAvatar('my')" src="" class="w-11 h-11 rounded-full border-4 border-white object-cover shadow-sm z-10 cursor-pointer">
                    <img id="duo-partner-img" onclick="changeAvatar('partner')" src="" class="w-11 h-11 rounded-full border-4 border-white object-cover shadow-sm cursor-pointer">
                </div>
            </div>

            <div class="flex justify-center gap-2 mb-8 overflow-x-auto no-scrollbar pb-2">
                <button id="tool-you" onclick="setDuoTool('you')" class="bg-white shadow-sm px-4 py-3 rounded-2xl text-[10px] font-black flex items-center gap-2 border-2 border-transparent transition-all whitespace-nowrap">
                    <div class="w-3 h-3 rounded-full bg-kin-blue"></div> TÚ
                </button>
                <button id="tool-partner" onclick="setDuoTool('partner')" class="bg-white shadow-sm px-4 py-3 rounded-2xl text-[10px] font-black flex items-center gap-2 border-2 border-transparent transition-all whitespace-nowrap">
                    <div class="w-3 h-3 rounded-full bg-kin-brown"></div> COMPA
                </button>
                <button id="tool-synced" onclick="setDuoTool('synced')" class="bg-white shadow-sm px-4 py-3 rounded-2xl text-[10px] font-black flex items-center gap-2 border-2 border-transparent transition-all whitespace-nowrap">
                    <div class="flex -space-x-1"><div class="w-3 h-3 rounded-full bg-kin-blue"></div><div class="w-3 h-3 rounded-full bg-kin-brown"></div></div> SYNC
                </button>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center mb-10">
                </div>

            <div class="bg-white p-8 rounded-[2.8rem] shadow-sm mb-12 border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-2xl uppercase italic">Programar Dúo</h3>
                    <span id="duo-selected-date" class="text-[10px] font-black bg-blue-50 text-kin-blue px-3 py-1.5 rounded-xl uppercase">---</span>
                </div>
                <input id="duo-session-title" type="text" placeholder="¿Qué toca hoy?" class="w-full bg-slate-50 p-5 rounded-2xl font-bold outline-none mb-6 border-2 border-transparent focus:border-kin-blue/10">
                <button onclick="scheduleNewDuo()" class="w-full bg-kin-blue text-white font-black py-6 rounded-3xl shadow-2xl uppercase tracking-widest active:scale-95 transition-transform">GUARDAR SESIÓN</button>
            </div>
            <div id="upcoming-duos-container" class="space-y-4 mb-10"></div>
        </section>

        <section id="view-workout" class="view-section"><div id="workout-groups-container" class="space-y-4 pt-6"></div></section>
        <section id="view-group-detail" class="view-section">
            <button onclick="switchTab('workout')" class="text-kin-blue font-black mb-6 italic flex items-center gap-2"><i class="ph-bold ph-arrow-left"></i> VOLVER</button>
            <h2 id="detail-group-title" class="text-4xl font-black uppercase italic mb-8">--</h2>
            <div id="detail-exercises-container" class="space-y-4 mb-32"></div>
        </section>
        <section id="view-nutrition" class="view-section">
             <div class="bg-white p-8 rounded-[2.8rem] shadow-sm mb-6 border border-slate-100">
                <p id="nutrition-rem-kcal" class="text-5xl font-black mb-10">2500</p>
                <div id="hydration-drops" class="flex justify-between mb-4"></div>
                <div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div id="hydration-bar" class="h-full bg-kin-blue w-0"></div></div>
             </div>
             <div id="meals-container" class="space-y-4"></div>
             <button onclick="openMealModal()" class="w-full bg-kin-blue text-white font-black py-5 rounded-3xl mt-8 shadow-xl uppercase">+ AÑADIR COMIDA</button>
        </section>
        <section id="view-notes" class="view-section">
            <div id="goals-container" class="bg-white p-8 rounded-[2.5rem] mb-10 shadow-sm border border-slate-100"></div>
            <div id="notes-container" class="space-y-8 mb-32"></div>
            <button onclick="openNoteModal()" class="fixed bottom-24 right-6 w-16 h-16 bg-kin-blue rounded-3xl text-white text-3xl shadow-2xl z-30"><i class="ph-bold ph-plus"></i></button>
        </section>
        <section id="view-profile" class="view-section">
            <h2 class="text-4xl font-black mb-10 pt-6 uppercase italic">Ajustes</h2>
            <div class="bg-white rounded-[3rem] p-12 text-center flex flex-col items-center shadow-sm border border-slate-100">
                <div class="relative cursor-pointer mb-8 group" onclick="changeAvatar('my')">
                    <img id="profile-avatar-img" src="" class="w-36 h-36 rounded-[3rem] object-cover shadow-2xl border-4 border-white">
                    <div class="absolute -bottom-2 -right-2 bg-kin-blue text-white w-12 h-12 rounded-full flex items-center justify-center border-4 border-white shadow-lg"><i class="ph ph-pencil-simple text-2xl"></i></div>
                </div>
                <h3 id="profile-name-text" onclick="editProfileName()" class="text-3xl font-black text-slate-800 flex items-center gap-2 cursor-pointer">Marcus Sterling <i class="ph ph-pencil-simple text-slate-300"></i></h3>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-between items-center px-2 py-4 max-w-md mx-auto left-0 right-0 z-50 shadow-2xl">
        <button onclick="switchTab('dashboard')" id="tab-dashboard" class="nav-item active flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph-fill ph-squares-four text-2xl"></i></div><span class="text-[9px] font-black uppercase">Panel</span></button>
        <button onclick="switchTab('workout')" id="tab-workout" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-barbell text-2xl"></i></div><span class="text-[9px] font-black uppercase">Entreno</span></button>
        <button onclick="switchTab('nutrition')" id="tab-nutrition" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-fork-knife text-2xl"></i></div><span class="text-[9px] font-black uppercase">Dieta</span></button>
        <button onclick="switchTab('notes')" id="tab-notes" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-journal-bookmark text-2xl"></i></div><span class="text-[9px] font-black uppercase">Diario</span></button>
        <button onclick="switchTab('shared')" id="tab-shared" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-users text-2xl"></i></div><span class="text-[9px] font-black uppercase">Dúo</span></button>
        <button onclick="switchTab('profile')" id="tab-profile" class="nav-item flex-1 flex flex-col items-center gap-2"><div class="icon-bg px-4 py-2"><i class="ph ph-user text-2xl"></i></div><span class="text-[9px] font-black uppercase">Perfil</span></button>
    </nav>

    <div id="meal-modal" class="hidden fixed inset-0 z-50 glass-modal flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
            <h3 class="text-3xl font-black uppercase mb-8 italic">Nueva Ingesta</h3>
            <input id="meal-name" type="text" placeholder="¿Qué has comido?" class="w-full bg-slate-100 p-5 rounded-2xl font-bold outline-none mb-4">
            <input id="meal-kcal" type="number" placeholder="Kcal" class="w-full bg-slate-100 p-5 rounded-2xl font-black mb-10">
            <div class="flex gap-4"><button onclick="closeModal('meal-modal')" class="flex-1 bg-slate-50 font-black py-5 rounded-2xl text-slate-400 uppercase">Cerrar</button><button onclick="saveNewMeal()" class="flex-1 bg-kin-blue text-white font-black py-5 rounded-2xl shadow-xl uppercase">Añadir</button></div>
        </div>
    </div>

    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
    <script src="app.js"></script>
</body>
</html>
