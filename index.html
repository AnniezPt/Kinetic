<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINETIC | Memento Mori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kin-blue': '#0047ff', 'kin-bg': '#f4f5f9', 'kin-dark': '#1e2024',
                        'kin-orange': '#b5531d', 'kin-brown': '#8b4513'
                    }
                }
            }
        }
    </script>
</head>
<body class="text-kin-dark pb-32">

    <div id="profile-selector" class="fixed inset-0 z-[100] bg-kin-bg flex flex-col items-center justify-center p-10">
        <h1 class="text-6xl font-black italic tracking-tighter mb-4 text-kin-blue">KINETIC</h1>
        <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300 mb-20">Selecciona tu Identidad</p>
        <div class="grid grid-cols-2 gap-10 w-full max-w-sm">
            <button onclick="selectUser('ana')" class="flex flex-col items-center gap-4 group">
                <div class="w-32 h-32 rounded-[2.8rem] bg-white shadow-2xl border-4 border-white overflow-hidden group-active:scale-90 transition-all">
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=200" class="w-full h-full object-cover">
                </div>
                <span class="font-black italic uppercase tracking-widest text-slate-400 group-hover:text-kin-blue">Ana</span>
            </button>
            <button onclick="selectUser('nestor')" class="flex flex-col items-center gap-4 group">
                <div class="w-32 h-32 rounded-[2.8rem] bg-white shadow-2xl border-4 border-white overflow-hidden group-active:scale-90 transition-all">
                    <img src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=crop&q=80&w=200" class="w-full h-full object-cover">
                </div>
                <span class="font-black italic uppercase tracking-widest text-slate-400 group-hover:text-kin-blue">Néstor</span>
            </button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header id="global-header" class="flex justify-between items-center p-6 sticky top-0 bg-kin-bg/90 backdrop-blur-md z-40">
            <div class="flex items-center gap-3">
                <img id="header-avatar" src="" class="w-12 h-12 rounded-xl object-cover shadow-sm border-2 border-white" onclick="changeAvatar()">
                <div>
                    <h1 class="font-black tracking-tighter text-2xl text-kin-blue leading-none">KINETIC</h1>
                    <span id="user-display-name" class="text-[9px] font-bold uppercase tracking-widest text-slate-400">--</span>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-50">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-[8px] font-black uppercase text-slate-400">Live</span>
            </div>
        </header>

        <main class="px-6 max-w-md mx-auto">
            <section id="view-dashboard" class="view-section active">
                <div class="mb-6">
                    <p class="text-kin-orange font-bold text-[10px] uppercase tracking-[0.3em] mb-1">Semana 0 • Fase Iniciación</p>
                    <h2 class="text-5xl font-black tracking-tighter uppercase italic leading-[0.9]">Dashboard</h2>
                    <div class="flex items-center gap-2 mt-5 text-xs font-black bg-white inline-flex px-4 py-2 rounded-xl shadow-sm border border-slate-100">
                        <span class="text-slate-400 uppercase tracking-widest border-r pr-2">Racha</span>
                        <span id="dash-streak">0 DÍAS</span>
                        <i class="ph-fill ph-fire text-kin-orange"></i>
                    </div>
                </div>

                <div class="bg-white rounded-[2.8rem] p-8 shadow-sm mb-4 border border-slate-50 flex flex-col items-center">
                    <div class="relative w-48 h-48 mb-8">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#f1f5f9" stroke-width="3.5"></path>
                            <path id="dash-cal-svg" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#0047ff" stroke-width="3.5" stroke-linecap="round"></path>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="dash-cal-percent" class="text-5xl font-black text-slate-800 tracking-tighter">0%</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Activo</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 w-full gap-6 px-2">
                        <div onclick="editStat('calories')" class="cursor-pointer group text-center border-r border-slate-100">
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 group-hover:text-kin-blue">Consumo <i class="ph-bold ph-pencil-simple ml-1"></i></p>
                            <p id="dash-active-cals" class="text-3xl font-black text-kin-blue italic">0</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Restantes</p>
                            <p id="dash-rem-cals" class="text-3xl font-black text-slate-800 tracking-tighter">--</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2.8rem] p-8 shadow-sm border border-slate-50">
                    <div onclick="editStat('weight')" class="flex justify-between items-center cursor-pointer group">
                        <div>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 group-hover:text-kin-blue">Peso Actual <i class="ph-bold ph-pencil-simple ml-1"></i></p>
                            <p class="text-5xl font-black tracking-tighter text-slate-800"><span id="dash-current-weight">--</span> <span class="text-sm font-bold text-slate-300 uppercase">KG</span></p>
                        </div>
                        <i class="ph ph-trend-up text-4xl text-slate-100"></i>
                    </div>
                </div>
            </section>

            <section id="view-workout" class="view-section">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic pt-6 mb-8">Entreno</h2>
                <div id="workout-groups-container" class="space-y-4"></div>
            </section>

            <section id="view-nutrition" class="view-section">
                <h2 class="text-4xl font-black uppercase italic pt-6 mb-8 tracking-tighter">Combustible</h2>
                <div class="bg-white p-8 rounded-[2.8rem] shadow-sm mb-6 border border-slate-100">
                    <p class="text-5xl font-black tracking-tighter mb-8"><span id="nutrition-rem-kcal">--</span> <span class="text-lg text-slate-300 italic uppercase">Kcal</span></p>
                    <div id="hydration-drops" class="flex justify-between mb-4"></div>
                    <div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div id="hydration-bar" class="h-full bg-kin-blue transition-all duration-500"></div></div>
                </div>
                <div id="meals-container" class="space-y-4"></div>
            </section>

            <section id="view-notes" class="view-section">
                <h2 class="text-4xl font-black tracking-tighter italic pt-6 mb-8 uppercase">Diario</h2>
                <div id="goals-container" class="bg-white p-8 rounded-[2.8rem] mb-10 shadow-sm border border-slate-100"></div>
                <div id="notes-container" class="space-y-10"></div>
            </section>

            <section id="view-shared" class="view-section">
                <div class="flex justify-between items-center mb-8 pt-6">
                    <div class="flex items-center gap-3">
                        <button onclick="changeMonth(-1)" class="text-slate-300"><i class="ph-bold ph-caret-left"></i></button>
                        <h2 id="calendar-month-title" class="text-3xl font-black tracking-tighter italic text-slate-800 uppercase w-40 text-center">---</h2>
                        <button onclick="changeMonth(1)" class="text-slate-300"><i class="ph-bold ph-caret-right"></i></button>
                    </div>
                </div>
                <div class="flex justify-center gap-2 mb-8">
                    <button id="tool-you" onclick="setDuoTool('you')" class="bg-white shadow-sm px-5 py-3 rounded-2xl text-[10px] font-black flex items-center gap-2 border-2 border-transparent">
                        <div class="w-3 h-3 rounded-full bg-kin-blue"></div> MI DÍA
                    </button>
                    <button id="tool-synced" onclick="setDuoTool('synced')" class="bg-white shadow-sm px-5 py-3 rounded-2xl text-[10px] font-black flex items-center gap-2 border-2 border-transparent">
                        <div class="flex -space-x-1"><div class="w-3 h-3 rounded-full bg-kin-blue"></div><div class="w-3 h-3 rounded-full bg-kin-brown"></div></div> SYNC
                    </button>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center mb-10"></div>
            </section>

            <section id="view-profile" class="view-section">
                <h2 class="text-4xl font-black mb-8 pt-6 tracking-tighter italic uppercase">Perfil</h2>
                <div class="bg-white rounded-[3rem] p-12 text-center flex flex-col items-center shadow-sm border border-slate-100">
                    <img id="profile-avatar-big" src="" class="w-40 h-40 rounded-[3rem] object-cover shadow-2xl border-4 border-white mb-8">
                    <h3 id="profile-name-big" class="text-3xl font-black uppercase italic tracking-tighter">--</h3>
                    <button onclick="logout()" class="mt-10 text-[10px] font-black text-slate-300 uppercase tracking-widest border px-6 py-3 rounded-xl active:scale-95 transition-all">Cerrar Sesión</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-between items-center px-4 py-4 max-w-md mx-auto left-0 right-0 z-50">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="nav-item active p-3 flex flex-col items-center gap-1">
                <i class="ph-fill ph-squares-four text-2xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Panel</span>
            </button>
            <button onclick="switchTab('workout')" id="tab-workout" class="nav-item p-3 flex flex-col items-center gap-1">
                <i class="ph ph-barbell text-2xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Entreno</span>
            </button>
            <button onclick="switchTab('nutrition')" id="tab-nutrition" class="nav-item p-3 flex flex-col items-center gap-1">
                <i class="ph ph-fork-knife text-2xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Dieta</span>
            </button>
            <button onclick="switchTab('shared')" id="tab-shared" class="nav-item p-3 flex flex-col items-center gap-1">
                <i class="ph ph-users text-2xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Dúo</span>
            </button>
            <button onclick="switchTab('notes')" id="tab-notes" class="nav-item p-3 flex flex-col items-center gap-1">
                <i class="ph ph-journal-bookmark text-2xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Diario</span>
            </button>
        </nav>
    </div>

    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
    <script src="app.js"></script>
</body>
</html>
